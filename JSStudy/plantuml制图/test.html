<html>
<head>
<meta charset="utf-8">
<script type="text/javascript" src="jquery.js"></script>
<script type="text/javascript" src="rawdeflate.js"></script>
<script type="text/javascript" src="jquery_plantuml.js"></script>
<!-- rawdeflate.js is implicity used by jquery_plantuml.js -->
</head>

<body>
	<p>Example</p>
	<hr>
	<img uml="
		Bob->Alice : foo
		Bob<--Alice : foo
	">
	<hr>
	<img uml='
		title 时序图

		== 鉴权阶段 ==

		Alice -> Bob: 请求
		Bob -> Alice: 应答

		== 数据上传 ==

		Alice -> Bob: 上传数据
		note left: 这是显示在左边的备注

		Bob --> Canny: 转交数据
		... 不超过 5 秒钟 ...
		Canny --> Bob: 状态返回
		note right: 这是显示在右边的备注

		Bob -> Alice: 状态返回

		== 状态显示 ==

		Alice -> Alice: 给自己发消息
	'>
	
	<hr>
	<img uml='
		package "组件1" {
			["组件1.1"] - ["组件1.2"]
			["组件1.2"] -> ["组件2.1"]
		}

		node "组件2" {
			["组件2.1"] - ["组件2.2"]
			["组件2.2"] --> [负载均衡服务器]
		}

		cloud {
			[负载均衡服务器] -> [逻辑服务器1]
			[负载均衡服务器] -> [逻辑服务器2]
			[负载均衡服务器] -> [逻辑服务器3]
		}

		database "MySql" {
			folder "This is my folder" {
				[Folder 3]
			}

			frame "Foo" {
				[Frame 4]
			}
		}

		[逻辑服务器1] --> [Folder 3]
		[逻辑服务器2] --> [Frame 4]
		[逻辑服务器3] --> [Frame 4]
	'>
	<hr>
	<img uml='
		start

		if (multiprocessor?) then (yes)
		  fork
			:Treatment 1;
		  fork again
			:Treatment 2;
		  end fork
		else (monoproc)
		  :Treatment 1;
		  :Treatment 2;
		endif
	'>
	
	<hr>
	<img uml='
		start

		repeat
		:read data;
		:generate diagrams;
		repeat while (more data?)

		stop
	'>
	
	<hr>
	<img uml='
		start

		if (graphviz installed?) then (yes)
		:process all\ndiagrams;
		else (no)
		:process only
		__sequence__ and __activity__ diagrams;
		endif

		stop
	'>

</body>

</html>
