<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>CryptoJS Test Suite</title>

        <!-- CryptoJS -->
        <script src="./src/core.js"></script>
        <script src="./src/md5.js"></script>
		<script src="./src/sha1.js"></script>
		<script src="./src/hmac.js"></script>
    </head>
    <!-- Test runner -->
        <script>
            var encrypted = CryptoJS.MD5("message");
			var hash = CryptoJS.SHA1("Message");
			var hhash1 = CryptoJS.HmacMD5("Message", "Secret Passphrase");
            var hhash2 = CryptoJS.HmacSHA1("Message", "Secret Passphrase");
			alert(encrypted+"\n"+hash+"\n"+hhash1+"\n"+hhash2);
        </script>
    </body>
</html>
