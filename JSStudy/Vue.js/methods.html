<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vue 测试</title>
<script src="./vue.min.js"></script>
</head>
<body>
<div id="app">
  {{ num }}</br>
  <button v-on:click="plus">Plus</button>
</div>

<script>
let vm = new Vue({
  el: '#app',
  data: {
    num: 1
  },
  methods:{
    plus(){
	  return this.num++;
	}
  }
})
</script>
</body>
</html>
