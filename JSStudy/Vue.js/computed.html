<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vue 测试</title>
<script src="./vue.min.js"></script>
</head>
<body>
<div id="app">
  Sum：{{ sum }}</br>
</div>

<script>
let vm = new Vue({
  el: '#app',
  data: {
    num1: 1,
	num2: 2,
	num3: 3
  },
  computed:{
    sum(){
	  return this.num1+this.num2+this.num3;
	}
  }
})
</script>
</body>
</html>
